<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ─── Primary ──────────────────────────────────────────────────────────── -->
  <title>Memuat... — Dramain Aja</title>
  <meta name="description" content="Nonton drama pendek tanpa iklan — DramaBox, PineDrama, GoodShort. Ribuan judul, gratis, langsung di browser." />
  <meta name="author" content="Dramain Aja" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#141414" />

  <!-- ─── Open Graph (diupdate dinamis oleh watch.js saat drama termuat) ───── -->
  <meta property="og:type" content="video.other" />
  <meta property="og:site_name" content="Dramain Aja" />
  <meta property="og:title" content="Dramain Aja — Nonton Drama Pendek Gratis" />
  <meta property="og:description" content="Nonton drama pendek tanpa iklan — DramaBox, PineDrama, GoodShort. Ribuan judul, gratis, langsung di browser." />
  <meta property="og:url" content="https://dramain-aja.web.app/" />
  <meta property="og:image" content="https://dramain-aja.web.app/og-image.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Dramain Aja — Nonton Drama Pendek Gratis" />
  <meta property="og:locale" content="id_ID" />

  <!-- ─── Twitter / X Card (diupdate dinamis oleh watch.js) ───────────────── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Dramain Aja — Nonton Drama Pendek Gratis" />
  <meta name="twitter:description" content="Nonton drama pendek tanpa iklan — DramaBox, PineDrama, GoodShort. Ribuan judul, gratis, langsung di browser." />
  <meta name="twitter:image" content="https://dramain-aja.web.app/og-image.jpg" />
  <meta name="twitter:image:alt" content="Dramain Aja — Nonton Drama Pendek Gratis" />

  <!-- ─── PWA ──────────────────────────────────────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dramain Aja" />
  <meta name="application-name" content="Dramain Aja" />

  <!-- ─── Favicon & Manifest ───────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <!-- canonical diperbarui dinamis oleh watch.js saat drama termuat -->
  <link rel="canonical" href="https://dramain-aja.web.app/watch.html" id="canonicalLink" />

  <!-- ─── Structured Data (diperbarui dinamis oleh watch.js) ───────────────── -->
  <script type="application/ld+json" id="schemaJsonLd">
  {
    "@context": "https://schema.org",
    "@type": "VideoObject",
    "name": "Dramain Aja — Nonton Drama Pendek Gratis",
    "description": "Nonton drama pendek tanpa iklan — DramaBox, PineDrama, GoodShort.",
    "thumbnailUrl": "https://dramain-aja.web.app/og-image.jpg",
    "uploadDate": "2026-01-01",
    "publisher": {
      "@type": "Organization",
      "name": "Dramain Aja",
      "url": "https://dramain-aja.web.app/"
    }
  }
  </script>

  <link rel="stylesheet" href="/style.css" />
  <script src="/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
</head>
<body class="watch-page">
  <header>
    <div class="header-inner">
      <a href="/" class="logo">Dramain<span>Aja</span></a>
      <button onclick="history.back()" class="btn-back" id="backBtn"><span></span> Kembali</button>
    </div>
  </header>

  <main class="watch-main">
    <div class="player-wrap">
      <div id="playerLoader" class="player-loader">
        <div class="spinner"></div>
        <p class="loader-text">Memuat video...</p>
      </div>
      <video id="videoPlayer" controls playsinline></video>
    </div>

    <div class="watch-info">
      <div id="dramaInfo">
        <div class="skeleton-title"></div>
        <div class="skeleton-text"></div>
      </div>

      <div class="episode-section">
        <div class="episode-section-head">
          <h3>Daftar Episode</h3>
          <button id="autoplayToggle" class="autoplay-toggle" aria-pressed="false">
            <span class="autoplay-track"><span class="autoplay-dot"></span></span>
            <span class="autoplay-label">Putar Otomatis</span>
          </button>
        </div>
        <div id="episodeStatus" class="ep-status"></div>
        <div id="episodeList" class="episode-grid"></div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/js/watch.js"></script>
  <script type="module">
    import { icon } from "/js/icons.js";
    document.querySelector("#backBtn span").innerHTML = icon.back();
  </script>
</body>
</html>
