  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="canonical" href="https://dramain-aja.web.app/" />

  <!-- ─── Structured Data ──────────────────────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Dramain Aja",
    "url": "https://dramain-aja.web.app/",
    "description": "Nonton drama pendek gratis — DramaBox, PineDrama, GoodShort. Ribuan judul, langsung di browser.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://dramain-aja.web.app/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <link rel="stylesheet" href="/style.css" />
  <script src="/config.js"></script>
  <script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">Dramain<span>Aja</span></a>

      <div class="header-right">
        <div class="provider-select-wrap">
          <select id="providerFilter">
          </select>
        </div>

        <div class="search-wrap" id="searchBar">
          <input id="searchInput" type="text" placeholder="Cari judul drama..." autocomplete="off" />
          <button id="searchClose" class="icon-btn" aria-label="Tutup pencarian"></button>
        </div>
        <button id="searchToggle" class="icon-btn" aria-label="Cari"></button>
      </div>
    </div>
  </header>

  <main>
    <div id="notifications" class="notif-bar hidden"></div>

    <section id="searchSection" class="hidden">
      <div class="search-section-head">
        <button id="searchBackBtn" class="icon-btn search-back-btn" aria-label="Kembali ke beranda"></button>
        <h2 id="searchTitle" class="search-title"></h2>
      </div>
      <div id="searchResults" class="grid-track"></div>
    </section>

    <section id="homeSection">
      <section id="hero" class="hero hidden"></section>

      <!-- Iklan: banner ExoClick — jeda alami setelah hero -->
      <div class="ad-slot">
        <span class="ad-slot-label">Iklan</span>
        <div class="ad-slot-unit">
          <ins class="eas6a97888e31" data-zoneid="5972888"></ins>
          <script>(AdProvider = window.AdProvider || []).push({"serve": {}});</script>
        </div>
      </div>

      <div id="rowsRoot"></div>

      <!-- Iklan: banner ExoClick — di akhir halaman -->
      <div class="ad-slot">
        <span class="ad-slot-label">Iklan</span>
        <div class="ad-slot-unit">
          <ins class="eas6a97888e37" data-zoneid="5972890"></ins>
          <script>(AdProvider = window.AdProvider || []).push({"serve": {}});</script>
        </div>
      </div>
    </section>
  </main>

  <div id="overlay" class="overlay hidden">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="Tutup"></button>
      <div id="modalContent"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/js/home.js"></script>
  <script type="module">
    import { icon } from "/js/icons.js";
    document.getElementById("searchToggle").innerHTML = icon.search();
    document.getElementById("searchClose").innerHTML = icon.close();
    document.getElementById("modalClose").innerHTML = icon.close();
    document.getElementById("searchBackBtn").innerHTML = icon.back();
  </script>

  <!-- Iklan: trigger popup ExoClick (VAST) sekali per sesi -->
  <script type="module" src="/js/ads.js"></script>
</body>
</html>
